<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #0f172a;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: #111827;
      height: 100vh;
      padding: 20px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      background: #4f46e5;
      border: none;
      color: white;
      cursor: pointer;
    }

    .topbar {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>🏨 HiveStay</h3>

  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showRooms()">Rooms</button>
</div>

<div class="main" id="main">

</div>

<script>

let rooms = [];

// generate 67 rooms
for(let i=101;i<=167;i++){
  rooms.push({id:i, status:"Available"});
}

let bookings = [];

function showDashboard(){

  let occupied = rooms.filter(r => r.status === "Occupied").length;
  let occupancy = Math.round((occupied / rooms.length) * 100);

  document.getElementById("main").innerHTML = `
    <div class="topbar">
      <h2>Dashboard</h2>
    </div>

    <div class="grid">
      <div class="card">Occupancy<br>${occupancy}%</div>
      <div class="card">Revenue<br>₱${bookings.length*1000}</div>
      <div class="card">Rooms<br>${rooms.length}</div>
      <div class="card">Bookings<br>${bookings.length}</div>
    </div>
  `;
}

function showRooms(){

  let html = rooms.map(r => `
    <div class="card">
      Room ${r.id} - ${r.status}
    </div>
  `).join("");

  document.getElementById("main").innerHTML = `
    <h2>Rooms (67)</h2>
    <div class="grid">${html}</div>
  `;
}

showDashboard();

</script>

</body>
</html>
