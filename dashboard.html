<!DOCTYPE html>
<html>
<head>
  <title>HiveStay PMS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- MODAL -->
  <div id="roomModal" class="modal">
    <div class="modal-content">

      <h3>🏨 Room Action</h3>

      <p id="modalRoomText"></p>

      <input id="guestName" placeholder="Enter Guest Name">

      <div class="modal-buttons">

        <button onclick="confirmCheckIn()">Check-In</button>
        <button onclick="confirmCheckOut()">Check-Out</button>
        <button onclick="closeModal()">Cancel</button>

      </div>

    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <h2>🏨 HiveStay PMS</h2>

    <div class="menu">
      <div onclick="renderRooms()">🏠 Dashboard</div>
      <div onclick="renderRooms()">🛏 Rooms</div>
      <div>📅 Reservations</div>
      <div>💰 Billing</div>
      <div>📊 Reports</div>
      <div>⚙ Settings</div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h3>Dashboard</h3>
      <div>Admin 👤</div>
    </div>

    <!-- STATS -->
    <div class="cards">

      <div class="card">
        🛏 Occupancy <br>
        <span id="occ">0%</span>
      </div>

      <div class="card">
        💰 Revenue <br>
        ₱<span id="rev">0</span>
      </div>

      <div class="card">
        👥 Guests <br>
        <span id="occupied">0</span>
      </div>

      <div class="card">
        🟢 Available <br>
        <span id="available">0</span>
      </div>

    </div>

    <!-- ROOM GRID -->
    <h3 style="margin-top:20px;">🏨 Room Status</h3>

    <div id="roomsContainer" class="room-grid"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
