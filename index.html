<!DOCTYPE html>
<html>
<head>
  <title>Home Crest Hotel PMS</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #94a3b8;
    }

    .nav {
      margin-top: 15px;
    }

    .nav button {
      padding: 10px 15px;
      margin-right: 8px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: #334155;
      padding: 15px;
      border-radius: 10px;
    }

    .room {
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
    }

    .available { background: #16a34a; }
    .occupied { background: #dc2626; }
    .cleaning { background: #eab308; color: black; }
  </style>
</head>

<body>

<h1>🏨 Home Crest Hotel PMS</h1>
<p>HiveStay MVP System</p>

<div class="nav">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('rooms')">Rooms</button>
</div>

<div id="content" class="card"></div>

<script>
function show(page){
  let c = document.getElementById("content");

  if(page==="rooms"){
    c.innerHTML = `
      <h2>🛏 Rooms</h2>
      <div class="room available">Room 101 - Available</div>
      <div class="room occupied">Room 102 - Occupied</div>
      <div class="room cleaning">Room 103 - Cleaning</div>
    `;
  } else {
    c.innerHTML = `
      <h2>📊 Dashboard</h2>
      <div class="grid">
        <div class="stat"><h3>Occupancy</h3><p>65%</p></div>
        <div class="stat"><h3>Revenue</h3><p>₱12,500</p></div>
        <div class="stat"><h3>Rooms</h3><p>24 Active</p></div>
        <div class="stat"><h3>Bookings</h3><p>12 Today</p></div>
      </div>
    `;
  }
}

// default load
show("dashboard");
</script>

</body>
</html>
