<!DOCTYPE html>
<html>
<head>
  <title>HiveStay PMS</title>
</head>

<body>

<h1>🏨 Home Crest Hotel PMS</h1>

<div id="main"></div>

<button onclick="showDashboard()">Dashboard</button>
<button onclick="showRooms()">Rooms</button>

<script>
function showDashboard(){
  document.getElementById("main").innerHTML = `
    <h2>Dashboard</h2>
    <p>Occupancy: 65%</p>
    <p>Revenue: ₱12,500</p>
  `;
}

function showRooms(){
  document.getElementById("main").innerHTML = `
    <h2>Rooms</h2>
    <p>Room 101 - Available</p>
    <p>Room 102 - Occupied</p>
  `;
}
</script>

</body>
</html>
