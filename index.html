<!DOCTYPE html>
<html>
<head>
  <title>HiveStay PMS</title>

  <style>
.room {
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  color: white;
}

/* COLORS */
.available {
  background: #16a34a;
}

.occupied {
  background: #dc2626;
}

.cleaning {
  background: #eab308;
  color: black;
}    
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #111827;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .menu button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* CARDS */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    /* ROOMS */
<script>
let rooms = [
  { id: 101, status: "Available" },
  { id: 102, status: "Occupied" },
  { id: 103, status: "Cleaning" }
];

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

function saveBookings(){
  localStorage.setItem("bookings", JSON.stringify(bookings));
}

function showDashboard(){

  let occupied = rooms.filter(r => r.status === "Occupied").length;
  let occupancy = Math.round((occupied / rooms.length) * 100);

  document.getElementById("main").innerHTML = `
    <div class="header">
      <h1>Dashboard</h1>
      <p class="small">Home Crest Hotel System</p>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Occupancy</h3>
        <p>${occupancy}%</p>
      </div>

      <div class="card">
        <h3>Revenue</h3>
        <p>₱${bookings.length * 1000}</p>
      </div>

      <div class="card">
        <h3>Rooms</h3>
        <p>${rooms.length} Active</p>
      </div>

      <div class="card">
        <h3>Bookings</h3>
        <p>${bookings.length} Today</p>
      </div>
    </div>
  `;
}

function showRooms(){

  let roomHTML = rooms.map(r => `
    <div class="room ${r.status.toLowerCase()}">
      Room ${r.id} - ${r.status}
    </div>
  `).join("");

  document.getElementById("main").innerHTML = `
    <div class="header">
      <h1>Rooms</h1>
      <p class="small">Click room to view status</p>
    </div>

    <div class="card">
      ${roomHTML}

      <button class="btn" onclick="alert('Booking feature already active 🚀')">
        + New Booking
      </button>
    </div>
  `;
}
</script>
    <script>

   function checkout(index){
  let roomNumber = bookings[index].room;

  // remove booking
  bookings.splice(index, 1);
  localStorage.setItem("bookings", JSON.stringify(bookings));

  // update room back to Available
  rooms = rooms.map(r => {
    if(r.id == roomNumber){
      return { ...r, status: "Available" };
    }
    return r;
  });

  alert("Guest Checked-out!");

  showRooms();
             } 
  /* HEADER */
    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
    }

    .small {
      color: #94a3b8;
    }

    /* BUTTON */
    .btn {
      padding: 10px;
      background: #4f46e5;
      border: none;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🏨 HiveStay PMS</h2>

  <div class="menu">
    <button onclick="showDashboard()">Dashboard</button>
    <button onclick="showRooms()">Rooms</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <h1>Dashboard</h1>
    <p class="small">Home Crest Hotel System</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Occupancy</h3>
      <p>65%</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>₱12,500</p>
    </div>

    <div class="card">
      <h3>Rooms</h3>
      <p>24 Active</p>
    </div>

    <div class="card">
      <h3>Bookings</h3>
      <p>12 Today</p>
    </div>
  </div>

</div>

<script>
function showDashboard(){

  // count occupied rooms
  let occupiedRooms = rooms.filter(r => r.status === "Occupied").length;

  // compute occupancy %
  let occupancyRate = rooms.length
    ? Math.round((occupiedRooms / rooms.length) * 100)
    : 0;

  // compute revenue (simple model: ₱1000 per booking)
  let revenue = bookings.length * 1000;

  document.getElementById("main").innerHTML = `
    <div class="header">
      <h1>Dashboard</h1>
      <p class="small">Home Crest Hotel System</p>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Occupancy</h3>
        <p>${occupancyRate}%</p>
      </div>

      <div class="card">
        <h3>Revenue</h3>
        <p>₱${revenue}</p>
      </div>

      <div class="card">
        <h3>Rooms</h3>
        <p>${rooms.length} Active</p>
      </div>

      <div class="card">
        <h3>Bookings</h3>
        <p>${bookings.length} Total</p>
      </div>

    </div>
  `;
}
</script>

</body>
</html>
